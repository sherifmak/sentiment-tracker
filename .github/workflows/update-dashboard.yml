name: Update Dashboard

on:
  # Hourly during US market hours (9:30am-4pm ET = 13:00-21:00 UTC)
  schedule:
    - cron: "0 13-21 * * 1-5"
  # Manual trigger
  workflow_dispatch:
  # Also rebuild on push to main (for code changes)
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate static dashboard
        run: python build_static.py

      - name: Commit and push updated dashboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          git diff --staged --quiet || git commit -m "Update dashboard $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
